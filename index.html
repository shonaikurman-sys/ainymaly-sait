<title>Айнымалылар — 4-сынып</title>
<style>
  :root{
    --bg:#eaf3ee;
    --bg-2:#e3f0ee;
    --cork:#b58a56;
    --cork-dot:rgba(60,38,10,.14);
    --cork-dot-2:rgba(255,255,255,.10);
    --note:#fff8e6;
    --note-2:#fdeec0;
    --ink:#223021;
    --ink-soft:#5b6b56;
    --moss:#3f8a4c;
    --moss-ink:#2a5c33;
    --sunset:#e67e3e;
    --sky:#3e93b0;
    --pin:#c23b3b;
    --green:#2fae83;
    --green-bg:#e3f6ee;
    --red:#e5554a;
    --red-bg:#fdeceb;
    --ring:#3f8a4c;
    --cham-grey:#9aa0a6;
    --shadow:0 18px 40px -20px rgba(34,48,33,.4);
  }
  :root[data-theme="dark"]{
    --bg:#0e1712; --bg-2:#0c1613;
    --cork:#4a3620; --cork-dot:rgba(0,0,0,.28); --cork-dot-2:rgba(255,255,255,.06);
    --note:#241f14; --note-2:#2d2717;
    --ink:#eaf0e6; --ink-soft:#a7b5a1;
    --moss:#5cbf6c; --moss-ink:#8fe39d;
    --sunset:#f2965a; --sky:#5fb6d1; --pin:#e35b5b;
    --green:#3fd79a; --green-bg:#12281f; --red:#ff7a6e; --red-bg:#331817;
    --ring:#5cbf6c; --cham-grey:#5b645d;
    --shadow:0 18px 44px -18px rgba(0,0,0,.7);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#0e1712; --bg-2:#0c1613; --cork:#4a3620; --cork-dot:rgba(0,0,0,.28); --cork-dot-2:rgba(255,255,255,.06);
      --note:#241f14; --note-2:#2d2717; --ink:#eaf0e6; --ink-soft:#a7b5a1;
      --moss:#5cbf6c; --moss-ink:#8fe39d; --sunset:#f2965a; --sky:#5fb6d1; --pin:#e35b5b;
      --green:#3fd79a; --green-bg:#12281f; --red:#ff7a6e; --red-bg:#331817;
      --ring:#5cbf6c; --cham-grey:#5b645d; --shadow:0 18px 44px -18px rgba(0,0,0,.7);
    }
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:linear-gradient(160deg, var(--bg), var(--bg-2));
    color:var(--ink);
    font-family:"Segoe UI","Helvetica Neue",Verdana,Tahoma,sans-serif;
    padding:26px 14px 64px;
    overflow-x:hidden;
  }
  .wrap{max-width:900px;margin:0 auto;}

  .board{
    background-color:var(--cork);
    background-image:
      radial-gradient(circle at 15% 25%, var(--cork-dot) 0 3px, transparent 4px),
      radial-gradient(circle at 55% 65%, var(--cork-dot) 0 3px, transparent 4px),
      radial-gradient(circle at 80% 15%, var(--cork-dot-2) 0 3px, transparent 4px),
      radial-gradient(circle at 35% 85%, var(--cork-dot) 0 2px, transparent 3px),
      radial-gradient(circle at 90% 55%, var(--cork-dot-2) 0 2px, transparent 3px);
    background-size:46px 46px, 60px 60px, 38px 38px, 52px 52px, 33px 33px;
    border-radius:20px;
    padding:30px 18px 26px;
    box-shadow:var(--shadow);
    position:relative;
  }
  @media (min-width:560px){ .board{padding:36px 30px 30px;} }

  .pin{
    position:absolute;left:50%;top:-9px;transform:translateX(-50%);
    width:16px;height:16px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff8a8a, var(--pin) 70%);
    box-shadow:0 3px 4px rgba(0,0,0,.35);
  }

  /* ---------- header note ---------- */
  .headnote{
    background:var(--note);
    border-radius:6px;
    padding:18px 18px 16px;
    transform:rotate(-1deg);
    box-shadow:0 10px 18px -8px rgba(0,0,0,.35);
    display:flex;gap:16px;align-items:flex-start;
    position:relative;
    margin-bottom:22px;
  }
  .mascot{flex:none;width:76px;height:70px;}
  .eyebrow{margin:0 0 4px;font-size:.7rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--moss-ink);}
  h1{margin:0 0 8px;font-size:clamp(1.3rem,4vw,1.8rem);font-weight:800;line-height:1.15;text-wrap:balance;color:var(--ink);}
  .objective{margin:0;font-size:.86rem;line-height:1.5;color:var(--ink-soft);max-width:54ch;}
  .objective__code{
    display:inline-block;background:var(--note-2);color:var(--moss-ink);
    border:1px solid color-mix(in srgb, var(--moss) 40%, transparent);
    border-radius:8px;padding:1px 7px;font-weight:800;font-size:.78rem;margin-right:6px;
    font-variant-numeric:tabular-nums;
  }

  /* ---------- score shelf ---------- */
  .shelf{
    display:flex;align-items:center;gap:14px;flex-wrap:wrap;
    background:rgba(0,0,0,.14);
    border-radius:14px;padding:10px 14px;margin-bottom:20px;
  }
  :root[data-theme="dark"] .shelf, .shelf{background:rgba(0,0,0,.16);}
  .beads{display:flex;flex-wrap:wrap;gap:4px;flex:1 1 200px;}
  .bead{
    width:12px;height:12px;border-radius:4px;background:var(--cham-grey);
    transition:background .25s ease, transform .2s ease;
  }
  .bead.ok{background:var(--green);}
  .bead.bad{background:var(--red);}
  .shelf__label{font-size:.7rem;font-weight:800;color:#fff;letter-spacing:.04em;text-transform:uppercase;flex:none;}
  .eraser{
    flex:none;font:inherit;font-weight:700;font-size:.78rem;cursor:pointer;
    background:var(--note);color:var(--ink);border:none;border-radius:8px;
    padding:7px 12px;box-shadow:0 3px 0 rgba(0,0,0,.3);transition:transform .1s;
  }
  .eraser:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.3);}

  /* ---------- folder tabs ---------- */
  .tabs{display:flex;gap:6px;margin-bottom:0;padding-left:8px;}
  .tab{
    font:inherit;font-weight:800;font-size:.84rem;cursor:pointer;
    padding:10px 18px 8px;border:none;
    clip-path:polygon(8% 0,92% 0,100% 100%,0% 100%);
    background:color-mix(in srgb, var(--note) 55%, transparent);
    color:color-mix(in srgb, var(--ink) 55%, transparent);
    transform:translateY(4px);
    transition:all .15s ease;
  }
  .tab.active{background:var(--note);color:var(--ink);transform:translateY(0);}
  .tab:focus-visible, .eraser:focus-visible, .optnote:focus-visible, .switch:focus-visible, .flag:focus-visible{
    outline:3px solid var(--ring);outline-offset:2px;
  }

  .panel{display:none;background:var(--note);border-radius:4px 14px 14px 14px;padding:18px 16px 20px;}
  .panel.active{display:block;}
  @media (min-width:560px){ .panel{padding:22px 22px 24px;} }

  .cards{display:flex;flex-direction:column;gap:22px;}

  /* ---------- pinned sticky card ---------- */
  .card{
    background:var(--note-2);
    border-radius:8px;
    padding:14px 14px 12px;
    position:relative;
    box-shadow:0 8px 14px -8px rgba(0,0,0,.3);
  }
  .card__pin{
    position:absolute;left:50%;top:-7px;transform:translateX(-50%);
    width:12px;height:12px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ffe08a, var(--sunset) 70%);
    box-shadow:0 2px 3px rgba(0,0,0,.35);
  }
  .card__top{display:flex;gap:10px;margin-bottom:10px;}
  .card__num{
    flex:none;width:24px;height:24px;border-radius:50%;
    background:var(--sky);color:#fff;font-weight:800;font-size:.78rem;
    display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;
  }
  .card__q{margin:1px 0 0;font-weight:700;font-size:.98rem;line-height:1.4;}

  .card__options{display:grid;gap:8px;grid-template-columns:1fr;margin-top:2px;}
  @media (min-width:520px){ .card__options{grid-template-columns:1fr 1fr;} }
  .optnote{
    text-align:left;font:inherit;font-size:.86rem;font-weight:600;cursor:pointer;
    background:var(--note);color:var(--ink);
    border:2px dashed color-mix(in srgb, var(--ink) 25%, transparent);
    border-radius:9px 11px 8px 12px;
    padding:8px 10px;line-height:1.32;
    display:flex;gap:7px;align-items:flex-start;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .optnote__tag{flex:none;font-weight:800;color:var(--sky);}
  .optnote:hover{border-color:var(--moss);}
  .optnote.tf{justify-content:center;text-align:center;font-weight:800;font-size:.92rem;}
  .optnote.is-selected{border-style:solid;border-color:var(--ink);}
  .optnote.is-correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .optnote.is-wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);}

  /* ---------- toggle switches ---------- */
  .card__switches{display:flex;gap:16px;margin-top:12px;flex-wrap:wrap;}
  .switch{display:inline-flex;align-items:center;gap:7px;cursor:pointer;background:none;border:none;font:inherit;padding:2px;}
  .switch__label{font-size:.74rem;font-weight:800;color:var(--ink-soft);}
  .switch__track{
    width:32px;height:18px;border-radius:99px;position:relative;flex:none;
    background:color-mix(in srgb, var(--ink) 18%, transparent);
    transition:background .2s ease;
  }
  .switch__thumb{
    position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
    background:var(--note);box-shadow:0 1px 2px rgba(0,0,0,.4);
    transition:transform .2s ease;
  }
  .switch.hint.is-on .switch__track{background:var(--sunset);}
  .switch.answer.is-on .switch__track{background:var(--sky);}
  .switch.is-on .switch__thumb{transform:translateX(14px);}
  .switch.is-on .switch__label{color:var(--ink);}

  .card__reveal{margin-top:10px;border-radius:9px;padding:9px 11px;font-size:.84rem;line-height:1.5;}
  .card__reveal.hint{background:color-mix(in srgb, var(--sunset) 20%, var(--note));color:var(--ink);}
  .card__reveal.answer{background:color-mix(in srgb, var(--sky) 16%, var(--note));color:var(--ink);}

  /* ---------- flag pager ---------- */
  .pager{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:22px;flex-wrap:wrap;}
  .flag{
    font:inherit;font-weight:800;font-size:.8rem;cursor:pointer;
    background:var(--note);color:var(--ink-soft);border:none;
    border-radius:0 8px 8px 0;padding:7px 14px 7px 10px;
    box-shadow:0 3px 0 rgba(0,0,0,.2);
    transition:transform .1s, background .15s, color .15s;
  }
  .flag.active{background:var(--moss);color:#fff;}
  .flag:disabled{opacity:.35;cursor:default;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
  }
</style>

<div class="wrap">
  <div class="board">
    <span class="pin"></span>

    <div class="headnote">
      <svg class="mascot" id="chamSvg" viewBox="0 0 80 70" aria-hidden="true">
        <path d="M12 52 Q4 46 6 36 Q8 30 16 32" stroke="var(--cham-body)" stroke-width="6" fill="none" stroke-linecap="round" id="chamTail"/>
        <ellipse cx="40" cy="46" rx="26" ry="14" fill="var(--cham-body)" id="chamBody"/>
        <circle cx="60" cy="34" r="13" fill="var(--cham-body)" id="chamHead"/>
        <circle cx="64" cy="28" r="5.2" fill="#fff"/>
        <circle cx="65" cy="27" r="2.4" fill="var(--ink)"/>
        <path d="M52 40 Q56 44 60 41" stroke="var(--ink)" stroke-width="1.6" fill="none" stroke-linecap="round"/>
        <rect x="22" y="56" width="4" height="10" rx="2" fill="var(--cham-body)" id="chamLeg1"/>
        <rect x="46" y="56" width="4" height="10" rx="2" fill="var(--cham-body)" id="chamLeg2"/>
        <ellipse cx="40" cy="46" rx="26" ry="14" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
      </svg>
      <div class="hud__text">
        <p class="eyebrow">4-сынып · Цифрлық сауаттылық</p>
        <h1>Айнымалылар</h1>
        <p class="objective"><span class="objective__code">4.4.2.1</span>Айнымалыларды қолдану</p>
      </div>
    </div>

    <div class="shelf">
      <span class="shelf__label">Түр-түсі</span>
      <div class="beads" id="beads"></div>
      <button class="eraser" id="resetBtn" type="button">🧽 Өшіру</button>
    </div>

    <nav class="tabs" role="tablist">
      <button class="tab active" id="tabBtn-mcq" data-tab="mcq" role="tab" aria-selected="true" type="button">📝 1-бөлім</button>
      <button class="tab" id="tabBtn-tf" data-tab="tf" role="tab" aria-selected="false" type="button">✅ 2-бөлім</button>
    </nav>

    <main>
      <section class="panel active" id="panel-mcq" role="tabpanel">
        <div class="cards" id="mcqCards"></div>
        <div class="pager" id="mcqPager"></div>
      </section>
      <section class="panel" id="panel-tf" role="tabpanel">
        <div class="cards" id="tfCards"></div>
        <div class="pager" id="tfPager"></div>
      </section>
    </main>
  </div>
</div>

<script>
(function(){
  "use strict";

  var LETTERS = ["А","Ә","Б","В"];

  var mcq = [
    {
      q:"Айнымалы дегеніміз не?",
      options:["Тұрақты, ешқашан өзгермейтін сан","Суреттің атауы","Мәні өзгеруі мүмкін, аты бар сақтауыш","Компьютердің бөлігі"],
      correct:2,
      hint:"«Айнымалы» сөзінің түбірі — «айналу, өзгеру».",
      answer:"Жауабы — Б. Айнымалы — өз мәнін өзгерте алатын, аты бар сақтауыш."
    },
    {
      q:"Ойында «Ұпай» деген айнымалының мәні неге өзгереді?",
      options:["Ойыншы ұпай жинаған сайын","Ойын аты өзгергенде","Экран түсі өзгергенде","Ешқашан өзгермейді"],
      correct:0,
      hint:"Ойыншы жаңа ұпай алса, сан қалай болады?",
      answer:"Жауабы — А. Ұпай санағыш — ойыншы ұпай жинаған сайын мәні артатын айнымалы."
    },
    {
      q:"Айнымалыға ат қою кезінде не істеу дұрыс?",
      options:["Ешқандай ат қоймау","Кез келген таңба қою","Тек сурет салу","Түсінікті, мағыналы ат қою (мысалы: ұпай, жас)"],
      correct:3,
      hint:"Атын оқыған адам не үшін екенін түсінуі керек пе?",
      answer:"Жауабы — В. Айнымалыға түсінікті ат қою керек, сонда оның не сақтайтыны белгілі болады."
    },
    {
      q:"«Жас = 9» дегенде «жас» — не, ал «9» — не?",
      options:["Екеуі де мән","«жас» — айнымалының аты, «9» — оның мәні","«9» — айнымалының аты","Екеуі де ат"],
      correct:1,
      hint:"Атау бір рет қойылады, ал мән өзгере алады.",
      answer:"Жауабы — Ә. «Жас» — айнымалының аты, ал «9» — сол айнымалыда сақталған мән."
    },
    {
      q:"Айнымалының мәні бағдарлама жұмыс істеп тұрғанда өзгере алады ма?",
      options:["Жоқ, ешқашан","Тек түсі өзгереді","Иә, мәні жаңартылып отырады","Тек аты өзгереді"],
      correct:2,
      hint:"«Айнымалы» сөзінің өзі не туралы айтады?",
      answer:"Жауабы — Б. Айнымалының басты қасиеті — оның мәні жұмыс барысында өзгере алады."
    },
    {
      q:"Мына тізімнің қайсысы айнымалыға мысал бола алады?",
      options:["Ойыншының өмірі (жаны) саны","Ойынның атауы (өзгермейтін)","Компьютердің түсі","Экранның өлшемі (өзгермейтін)"],
      correct:0,
      hint:"Қайсысы ойын кезінде өзгеріп отырады?",
      answer:"Жауабы — А. Ойыншының жандар саны ойын барысында азаяды немесе көбейеді, яғни бұл айнымалы."
    },
    {
      q:"Айнымалының мәнін өзгерту үшін не істейміз?",
      options:["Компьютерді өшіреміз","Атын өзгертеміз","Ештеңе істемейміз","Жаңа мән меншіктейміз (береміз)"],
      correct:3,
      hint:"Қорапшадағы затты ауыстыру үшін не істейміз?",
      answer:"Жауабы — В. Айнымалыға жаңа мән беру арқылы (меншіктеу) оның мәнін өзгертеміз."
    },
    {
      q:"«Ұпай» айнымалысының бастапқы мәні қандай болғаны дұрыс?",
      options:["100","0","-5","Мән керек емес"],
      correct:1,
      hint:"Ойын жаңа басталғанда ұпай неше болу керек?",
      answer:"Жауабы — Ә. Ойын басында ұпай әдетте 0-ден басталады, содан кейін артады."
    },
    {
      q:"Айнымалыны қораппен салыстырсақ, қораптың сыртындағы жапсырма (атауы) нені білдіреді?",
      options:["Қораптың түсін","Қораптың салмағын","Айнымалының атын","Қораптың мәнін"],
      correct:2,
      hint:"Жапсырма — заттың не екенін көрсету үшін керек пе?",
      answer:"Жауабы — Б. Жапсырма — айнымалының атын білдіреді, ал қораптың іші — оның мәні."
    },
    {
      q:"Неге бағдарламаларда айнымалылар қажет?",
      options:["Мәліметтерді сақтап, өзгерту үшін","Экранды әдемі ету үшін","Компьютерді жылдам қосу үшін","Суреттерді өшіру үшін"],
      correct:0,
      hint:"Ұпай, жас, есім сияқты мәліметтерді қайда сақтаймыз?",
      answer:"Жауабы — А. Айнымалылар мәліметтерді сақтап, қажет болғанда өзгерту үшін қолданылады."
    }
  ];

  var tf = [
    {q:"Айнымалының мәні бағдарлама жұмысы кезінде өзгере алады.", correct:true,
     hint:"«Айнымалы» сөзінің мағынасын ойлан.", answer:"Дұрыс. Айнымалының басты қасиеті — оның мәні өзгере алады."},
    {q:"«Ұпай» — ойындағы айнымалыға жақсы мысал бола алады.", correct:true,
     hint:"Ұпай саны ойын кезінде өзгере ме?", answer:"Дұрыс. Ұпай ойыншы жеңіске жеткен сайын өзгеретін айнымалы."},
    {q:"Айнымалының аты әр жолы жаңа мән бергенде өзгеруі керек.", correct:false,
     hint:"Ат бір рет қойылады ма, әлде әр жолы ауыстырыла ма?", answer:"Бұрыс. Айнымалының аты тұрақты қалады, тек мәні өзгереді."},
    {q:"Айнымалыда бір ғана мән мәңгі сақталады, оны ауыстыруға болмайды.", correct:false,
     hint:"Затты ауыстыруға бола ма?", answer:"Бұрыс. Айнымалыға жаңа мән беріп, ескісін ауыстыруға болады."},
    {q:"«Жас = 9» жазуында 9 саны — айнымалының мәні.", correct:true,
     hint:"Теңдік белгісінің оң жағында не тұр?", answer:"Дұрыс. 9 — «жас» айнымалысына берілген мән."},
    {q:"Компьютерлік бағдарламаларда айнымалылар қажет емес.", correct:false,
     hint:"Ұпай, өмір саны сияқты мәліметтерді сақтау үшін не керек?", answer:"Бұрыс. Айнымалылар мәліметтерді сақтау және өзгерту үшін өте қажет."},
    {q:"Айнымалыны хамелеонмен салыстыруға болады: аты тұрақты, ал түсі (мәні) өзгереді.", correct:true,
     hint:"Хамелеон өз атын өзгертеді ме, әлде түсін бе?", answer:"Дұрыс. Хамелеон — өзгеретін мәні бар айнымалыны түсінудің қызықты әдісі."}
  ];

  var PAGE_SIZE_MCQ = 5;
  var PAGE_SIZE_TF = 4;
  var TOTAL = mcq.length + tf.length;

  var state = {
    mcqSel: mcq.map(function(){return null;}),
    tfSel: tf.map(function(){return null;}),
    mcqHint: mcq.map(function(){return false;}),
    mcqAns: mcq.map(function(){return false;}),
    tfHint: tf.map(function(){return false;}),
    tfAns: tf.map(function(){return false;}),
    mcqPage: 0,
    tfPage: 0
  };

  function lerp(a,b,t){ return Math.round(a + (b-a)*t); }
  function mixColor(t){
    var c1 = [154,160,166], c2 = [63,138,76];
    return "rgb(" + lerp(c1[0],c2[0],t) + "," + lerp(c1[1],c2[1],t) + "," + lerp(c1[2],c2[2],t) + ")";
  }

  function itemState(i){
    if(i < mcq.length){
      var sel = state.mcqSel[i];
      if(sel === null || sel === undefined) return "none";
      return sel === mcq[i].correct ? "ok" : "bad";
    } else {
      var j = i - mcq.length;
      var tsel = state.tfSel[j];
      if(tsel === null || tsel === undefined) return "none";
      return tsel === tf[j].correct ? "ok" : "bad";
    }
  }

  function updateScore(){
    var s = 0;
    var beadsEl = document.getElementById("beads");
    beadsEl.innerHTML = "";
    for(var i=0;i<TOTAL;i++){
      var st = itemState(i);
      if(st === "ok") s++;
      var b = document.createElement("span");
      b.className = "bead" + (st === "ok" ? " ok" : st === "bad" ? " bad" : "");
      beadsEl.appendChild(b);
    }
    var t = s / TOTAL;
    var color = mixColor(t);
    document.getElementById("chamSvg").style.setProperty("--cham-body", color);
  }

  function buildMcqCard(item, i){
    var card = document.createElement("article");
    card.className = "card";
    card.style.transform = "rotate(" + (((i*37)%7)-3) + "deg)";

    var pin = document.createElement("span");
    pin.className = "card__pin";
    card.appendChild(pin);

    var top = document.createElement("div");
    top.className = "card__top";
    var num = document.createElement("span");
    num.className = "card__num";
    num.textContent = (i+1);
    var q = document.createElement("p");
    q.className = "card__q";
    q.textContent = item.q;
    top.appendChild(num); top.appendChild(q);
    card.appendChild(top);

    var opts = document.createElement("div");
    opts.className = "card__options";
    item.options.forEach(function(text, oi){
      var b = document.createElement("button");
      b.type = "button";
      b.className = "optnote";
      var tag = document.createElement("span");
      tag.className = "optnote__tag";
      tag.textContent = LETTERS[oi] + ")";
      var label = document.createElement("span");
      label.textContent = text;
      b.appendChild(tag); b.appendChild(label);
      applyOptState(b, oi, item, state.mcqSel[i]);
      b.addEventListener("click", function(){
        state.mcqSel[i] = oi;
        Array.prototype.forEach.call(opts.children, function(child, ci){
          applyOptState(child, ci, item, oi);
        });
        updateScore();
      });
      opts.appendChild(b);
    });
    card.appendChild(opts);

    card.appendChild(buildSwitches(i, item, state.mcqHint, state.mcqAns));
    return card;
  }

  function applyOptState(btn, oi, item, selected){
    btn.classList.remove("is-selected","is-correct","is-wrong");
    if(selected === null || selected === undefined) return;
    if(oi === selected){
      btn.classList.add("is-selected");
      btn.classList.add(oi === item.correct ? "is-correct" : "is-wrong");
    } else if(oi === item.correct){
      btn.classList.add("is-correct");
    }
  }

  function buildTfCard(item, i){
    var card = document.createElement("article");
    card.className = "card";
    card.style.transform = "rotate(" + (((i*29)%5)-2) + "deg)";

    var pin = document.createElement("span");
    pin.className = "card__pin";
    card.appendChild(pin);

    var top = document.createElement("div");
    top.className = "card__top";
    var num = document.createElement("span");
    num.className = "card__num";
    num.textContent = (i+1);
    var q = document.createElement("p");
    q.className = "card__q";
    q.textContent = item.q;
    top.appendChild(num); top.appendChild(q);
    card.appendChild(top);

    var opts = document.createElement("div");
    opts.className = "card__options";
    [["Дұрыс ✓", true], ["Бұрыс ✕", false]].forEach(function(pair){
      var text = pair[0], val = pair[1];
      var b = document.createElement("button");
      b.type = "button";
      b.className = "optnote tf";
      b.textContent = text;
      applyTfState(b, item, val, state.tfSel[i]);
      b.addEventListener("click", function(){
        state.tfSel[i] = val;
        Array.prototype.forEach.call(opts.children, function(child, ci){
          applyTfState(child, item, [true,false][ci], val);
        });
        updateScore();
      });
      opts.appendChild(b);
    });
    card.appendChild(opts);

    card.appendChild(buildSwitches(i, item, state.tfHint, state.tfAns));
    return card;
  }

  function applyTfState(btn, item, ownVal, selected){
    btn.classList.remove("is-selected","is-correct","is-wrong");
    if(selected === null || selected === undefined) return;
    if(ownVal === selected){
      btn.classList.add("is-selected");
      btn.classList.add(ownVal === item.correct ? "is-correct" : "is-wrong");
    } else if(ownVal === item.correct){
      btn.classList.add("is-correct");
    }
  }

  function buildSwitches(i, item, hintArr, ansArr){
    var wrap = document.createElement("div");

    var row = document.createElement("div");
    row.className = "card__switches";

    function makeSwitch(kind, label, arr, box){
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "switch " + kind + (arr[i] ? " is-on" : "");
      btn.setAttribute("aria-pressed", arr[i] ? "true" : "false");
      var track = document.createElement("span");
      track.className = "switch__track";
      var thumb = document.createElement("span");
      thumb.className = "switch__thumb";
      track.appendChild(thumb);
      var lab = document.createElement("span");
      lab.className = "switch__label";
      lab.textContent = label;
      btn.appendChild(track); btn.appendChild(lab);
      btn.addEventListener("click", function(){
        arr[i] = !arr[i];
        btn.classList.toggle("is-on", arr[i]);
        btn.setAttribute("aria-pressed", arr[i] ? "true" : "false");
        box.hidden = !arr[i];
      });
      return btn;
    }

    var hintBox = document.createElement("div");
    hintBox.className = "card__reveal hint";
    hintBox.textContent = "💡 " + item.hint;
    hintBox.hidden = !hintArr[i];

    var ansBox = document.createElement("div");
    ansBox.className = "card__reveal answer";
    ansBox.textContent = "✅ " + item.answer;
    ansBox.hidden = !ansArr[i];

    row.appendChild(makeSwitch("hint", "Кеңес", hintArr, hintBox));
    row.appendChild(makeSwitch("answer", "Жауап", ansArr, ansBox));

    wrap.appendChild(row);
    wrap.appendChild(hintBox);
    wrap.appendChild(ansBox);
    return wrap;
  }

  function renderPage(kind){
    var isMcq = kind === "mcq";
    var data = isMcq ? mcq : tf;
    var pageSize = isMcq ? PAGE_SIZE_MCQ : PAGE_SIZE_TF;
    var page = isMcq ? state.mcqPage : state.tfPage;
    var container = document.getElementById(isMcq ? "mcqCards" : "tfCards");
    var pagerEl = document.getElementById(isMcq ? "mcqPager" : "tfPager");

    var pageCount = Math.ceil(data.length / pageSize);
    var start = page * pageSize;
    var end = Math.min(start + pageSize, data.length);

    container.innerHTML = "";
    for(var i = start; i < end; i++){
      container.appendChild(isMcq ? buildMcqCard(data[i], i) : buildTfCard(data[i], i));
    }

    pagerEl.innerHTML = "";
    if(pageCount > 1){
      for(var p = 0; p < pageCount; p++){
        (function(p){
          var f = document.createElement("button");
          f.type = "button";
          f.className = "flag" + (p === page ? " active" : "");
          f.textContent = (p+1) + "-парақ";
          f.addEventListener("click", function(){
            if(isMcq){ state.mcqPage = p; } else { state.tfPage = p; }
            renderPage(kind);
          });
          pagerEl.appendChild(f);
        })(p);
      }
    }
  }

  function switchTab(target){
    ["mcq","tf"].forEach(function(k){
      var isTarget = k === target;
      document.getElementById("tabBtn-" + k).classList.toggle("active", isTarget);
      document.getElementById("tabBtn-" + k).setAttribute("aria-selected", isTarget ? "true" : "false");
      document.getElementById("panel-" + k).classList.toggle("active", isTarget);
    });
  }

  document.getElementById("tabBtn-mcq").addEventListener("click", function(){ switchTab("mcq"); });
  document.getElementById("tabBtn-tf").addEventListener("click", function(){ switchTab("tf"); });

  document.getElementById("resetBtn").addEventListener("click", function(){
    state.mcqSel = mcq.map(function(){return null;});
    state.tfSel = tf.map(function(){return null;});
    renderPage("mcq");
    renderPage("tf");
    updateScore();
  });

  renderPage("mcq");
  renderPage("tf");
  updateScore();
})();
</script>
