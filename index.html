<title>Айнымалылар — 4-сынып</title>
<style>
  :root{
    --bg:#eef0f4;
    --bg-2:#e3e7ee;
    --surface:#ffffff;
    --surface-2:#f1e8d2;
    --crate:#5c4326;
    --crate-tape:#c9974f;
    --ink:#2b2118;
    --ink-soft:#71624a;
    --kraft:#b97a3d;
    --kraft-ink:#7a4e1f;
    --stamp:#d6483f;
    --teal:#1f8a82;
    --green:#2fae83;
    --green-bg:#e3f6ee;
    --red:#e5554a;
    --red-bg:#fdeceb;
    --ring:#b97a3d;
    --counter-bg:#211a12;
    --counter-fg:#ffd897;
    --shadow:0 18px 40px -20px rgba(43,33,24,.4);
  }
  :root[data-theme="dark"]{
    --bg:#12151b;
    --bg-2:#171b23;
    --surface:#1c212b;
    --surface-2:#2a2115;
    --crate:#0d0a06;
    --crate-tape:#8a6738;
    --ink:#f1e9db;
    --ink-soft:#b7a88c;
    --kraft:#d69a55;
    --kraft-ink:#ffcf8f;
    --stamp:#ff8378;
    --teal:#4fd0c6;
    --green:#3fd79a;
    --green-bg:#0f2a22;
    --red:#ff7a6e;
    --red-bg:#331817;
    --ring:#d69a55;
    --counter-bg:#000000;
    --counter-fg:#ffd897;
    --shadow:0 18px 44px -18px rgba(0,0,0,.7);
  }
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]){
      --bg:#12151b; --bg-2:#171b23; --surface:#1c212b; --surface-2:#2a2115;
      --crate:#0d0a06; --crate-tape:#8a6738; --ink:#f1e9db; --ink-soft:#b7a88c;
      --kraft:#d69a55; --kraft-ink:#ffcf8f; --stamp:#ff8378; --teal:#4fd0c6;
      --green:#3fd79a; --green-bg:#0f2a22; --red:#ff7a6e; --red-bg:#331817;
      --ring:#d69a55; --counter-bg:#000000; --counter-fg:#ffd897;
      --shadow:0 18px 44px -18px rgba(0,0,0,.7);
    }
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(55vw 55vw at 8% 6%, color-mix(in srgb, var(--kraft) 15%, transparent), transparent 60%),
      radial-gradient(48vw 48vw at 94% 92%, color-mix(in srgb, var(--teal) 12%, transparent), transparent 60%),
      linear-gradient(180deg, var(--bg), var(--bg-2));
    color:var(--ink);
    font-family:"Segoe UI","Helvetica Neue",Verdana,Tahoma,sans-serif;
    padding:28px 16px 64px;
    overflow-x:hidden;
  }
  .wrap{max-width:880px;margin:0 auto;}

  /* ---------- crate frame ---------- */
  .crate{
    background:var(--crate);
    border-radius:22px;
    padding:0 0 14px;
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
  }
  .tape{
    height:26px;
    background:repeating-linear-gradient(
      45deg,
      var(--crate-tape) 0 14px,
      color-mix(in srgb, var(--crate-tape) 70%, black) 14px 28px
    );
    display:flex;align-items:center;justify-content:center;
    position:relative;
  }
  .tape__label{
    background:var(--surface);color:var(--kraft-ink);
    font-size:.68rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    padding:2px 12px;border-radius:99px;box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .bolt{
    position:absolute;width:9px;height:9px;border-radius:50%;
    background:color-mix(in srgb, var(--crate-tape) 60%, black);
    box-shadow:inset 0 1px 1px rgba(255,255,255,.25);
  }
  .bolt--tl{top:10px;left:10px;} .bolt--tr{top:10px;right:10px;}
  .bolt--bl{bottom:10px;left:10px;} .bolt--br{bottom:10px;right:10px;}

  .screen{
    background:var(--surface);
    margin:10px 10px 0;
    border-radius:18px;
    padding:22px 20px 26px;
  }
  @media (min-width:560px){ .screen{padding:30px 34px 34px;} }

  /* ---------- HUD header ---------- */
  .hud{
    display:flex;align-items:flex-start;gap:16px;
    padding-bottom:18px;
    border-bottom:1px dashed color-mix(in srgb, var(--ink) 16%, transparent);
  }
  .mascot{flex:none;width:64px;height:70px;filter:drop-shadow(0 6px 10px rgba(0,0,0,.14));}
  .eyebrow{
    margin:0 0 4px;font-size:.72rem;font-weight:700;letter-spacing:.09em;text-transform:uppercase;
    color:var(--kraft-ink);
  }
  h1{
    margin:0 0 8px;font-size:clamp(1.35rem,4.2vw,1.85rem);font-weight:800;line-height:1.15;
    text-wrap:balance;color:var(--ink);
  }
  .objective{margin:0;font-size:.87rem;line-height:1.5;color:var(--ink-soft);max-width:56ch;}
  .objective__code{
    display:inline-block;background:var(--surface-2);color:var(--kraft-ink);
    border:1px solid color-mix(in srgb, var(--kraft) 40%, transparent);
    border-radius:8px;padding:1px 7px;font-weight:800;font-size:.78rem;margin-right:6px;
    font-variant-numeric:tabular-nums;
  }

  /* ---------- score counter ---------- */
  .scorebar{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin:18px 0 16px;}
  .counter{
    flex:none;background:var(--counter-bg);border-radius:10px;padding:8px 14px;
    font-family:"Consolas","Courier New",monospace;
    font-size:1.1rem;font-weight:700;color:var(--counter-fg);
    font-variant-numeric:tabular-nums;letter-spacing:.05em;
    box-shadow:inset 0 2px 6px rgba(0,0,0,.5);
    transition:transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .counter.bump{transform:scale(1.08);}
  .scorebar__caption{font-size:.72rem;color:var(--ink-soft);font-weight:700;flex:1 1 140px;letter-spacing:.04em;text-transform:uppercase;}
  .btn{
    font:inherit;font-weight:700;font-size:.82rem;cursor:pointer;
    border-radius:99px;padding:8px 16px;border:1px solid transparent;
    transition:transform .15s ease, box-shadow .15s ease, background .15s ease;
  }
  .btn:active{transform:scale(.96);}
  .btn--ghost{background:var(--surface-2);color:var(--ink-soft);border-color:color-mix(in srgb, var(--ink) 14%, transparent);}
  .btn--ghost:hover{color:var(--red);border-color:color-mix(in srgb, var(--red) 45%, transparent);}

  /* ---------- tabs ---------- */
  .tabs{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap;}
  .tab{
    flex:1 1 200px;display:flex;align-items:center;justify-content:center;gap:8px;
    font:inherit;font-weight:800;font-size:.88rem;cursor:pointer;
    padding:12px 14px;border-radius:14px;border:2px solid transparent;
    background:var(--surface-2);color:var(--ink-soft);transition:all .18s ease;
  }
  .tab__count{
    font-size:.72rem;font-weight:800;background:color-mix(in srgb, var(--ink) 10%, transparent);
    color:var(--ink-soft);border-radius:99px;padding:1px 8px;font-variant-numeric:tabular-nums;
  }
  .tab.active{background:color-mix(in srgb, var(--kraft) 20%, var(--surface));border-color:var(--kraft);color:var(--kraft-ink);}
  .tab.active .tab__count{background:var(--kraft);color:#2b1d0c;}
  .tab:focus-visible, .btn:focus-visible, .opt:focus-visible, .tool:focus-visible, .pager button:focus-visible{
    outline:3px solid var(--ring);outline-offset:2px;
  }

  .panel{display:none;}
  .panel.active{display:block;}
  .cards{display:flex;flex-direction:column;gap:16px;}

  /* ---------- tag-style card ---------- */
  .card{
    background:var(--surface-2);
    border:1px dashed color-mix(in srgb, var(--kraft-ink) 45%, transparent);
    border-radius:4px 14px 14px 4px;
    padding:16px 16px 14px 20px;
    position:relative;
  }
  .card::before{
    content:"";position:absolute;left:-1px;top:14px;width:10px;height:10px;
    background:var(--surface);border:1px dashed color-mix(in srgb, var(--kraft-ink) 45%, transparent);
    border-radius:50%;
  }
  .card__top{display:flex;gap:10px;margin-bottom:12px;}
  .card__num{
    flex:none;width:28px;height:28px;border-radius:6px;
    background:var(--stamp);color:#fff;font-weight:800;font-size:.85rem;
    display:flex;align-items:center;justify-content:center;font-variant-numeric:tabular-nums;
    transform:rotate(-4deg);
  }
  .card__q{margin:2px 0 0;font-weight:700;font-size:1rem;line-height:1.4;}

  .card__options{display:grid;gap:8px;grid-template-columns:1fr;}
  @media (min-width:520px){ .card__options{grid-template-columns:1fr 1fr;} }
  .opt{
    text-align:left;font:inherit;font-size:.88rem;font-weight:600;cursor:pointer;
    background:var(--surface);color:var(--ink);
    border:2px solid color-mix(in srgb, var(--ink) 12%, transparent);
    border-radius:10px;padding:9px 12px;line-height:1.35;
    display:flex;gap:8px;align-items:flex-start;
    transition:border-color .15s ease, background .15s ease, transform .1s ease;
  }
  .opt__tag{flex:none;font-weight:800;color:var(--kraft-ink);}
  .opt:hover{border-color:var(--kraft);}
  .opt.tf{justify-content:center;text-align:center;font-weight:800;font-size:.95rem;}
  .opt.is-selected{border-color:var(--ink);transform:translateY(-1px);}
  .opt.is-correct{background:var(--green-bg);border-color:var(--green);color:var(--green);}
  .opt.is-wrong{background:var(--red-bg);border-color:var(--red);color:var(--red);}

  .card__tools{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap;}
  .tool{
    font:inherit;font-size:.78rem;font-weight:800;cursor:pointer;
    border-radius:99px;padding:6px 13px;border:2px solid transparent;
    background:var(--surface);color:var(--ink-soft);
    border-color:color-mix(in srgb, var(--ink) 14%, transparent);
    transition:all .15s ease;
  }
  .tool[data-type="hint"].is-open{background:#ffc145;border-color:#ffc145;color:#5a4200;}
  .tool[data-type="answer"].is-open{background:var(--teal);border-color:var(--teal);color:#fff;}

  .card__reveal{margin-top:10px;border-radius:10px;padding:10px 12px;font-size:.85rem;line-height:1.5;}
  .card__reveal.hint{background:color-mix(in srgb, #ffc145 22%, var(--surface));color:var(--ink);}
  .card__reveal.answer{background:color-mix(in srgb, var(--teal) 14%, var(--surface));color:var(--ink);}

  .pager{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:20px;}
  .pager button{
    font:inherit;font-weight:800;font-size:.82rem;cursor:pointer;
    background:var(--surface-2);color:var(--ink);
    border:1px solid color-mix(in srgb, var(--ink) 14%, transparent);
    border-radius:99px;padding:8px 16px;
  }
  .pager button:disabled{opacity:.35;cursor:default;}
  .pager__dots{display:flex;gap:6px;}
  .pager__dot{width:8px;height:8px;border-radius:99px;background:color-mix(in srgb, var(--ink) 22%, transparent);}
  .pager__dot.active{background:var(--kraft);width:20px;}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
  }
</style>

<div class="wrap">
  <div class="crate">
    <span class="bolt bolt--tl"></span><span class="bolt bolt--tr"></span>
    <span class="bolt bolt--bl"></span><span class="bolt bolt--br"></span>
    <div class="tape"><span class="tape__label">Айнымалылар қоймасы</span></div>
    <div class="screen">

      <header class="hud">
        <svg class="mascot" viewBox="0 0 64 70" aria-hidden="true">
          <rect x="10" y="26" width="44" height="34" rx="4" fill="var(--kraft)"/>
          <rect x="10" y="26" width="44" height="10" fill="var(--kraft-ink)"/>
          <rect x="8" y="20" width="48" height="8" rx="2" fill="var(--stamp)"/>
          <circle cx="24" cy="42" r="4" fill="#fff"/>
          <circle cx="40" cy="42" r="4" fill="#fff"/>
          <circle cx="24" cy="42" r="1.8" fill="var(--ink)"/>
          <circle cx="40" cy="42" r="1.8" fill="var(--ink)"/>
          <path d="M25 51 Q32 56 39 51" stroke="var(--ink)" stroke-width="2.4" fill="none" stroke-linecap="round"/>
          <rect x="26" y="4" width="12" height="12" rx="2" fill="var(--surface)" stroke="var(--ink)" stroke-width="1.6" transform="rotate(-8 32 10)"/>
          <text x="32" y="14" font-size="8" font-weight="800" fill="var(--teal)" text-anchor="middle" transform="rotate(-8 32 10)">x</text>
          <line x1="30" y1="16" x2="24" y2="24" stroke="var(--ink-soft)" stroke-width="1.4"/>
          <path d="M4 44 L10 40 L10 48 Z" fill="var(--teal)"/>
          <path d="M60 44 L54 40 L54 48 Z" fill="var(--teal)"/>
        </svg>
        <div class="hud__text">
          <p class="eyebrow">4-сынып · Цифрлық сауаттылық</p>
          <h1>Айнымалылар</h1>
          <p class="objective"><span class="objective__code">4.4.2.1</span>Айнымалыларды қолдану</p>
        </div>
      </header>

      <div class="scorebar">
        <div class="counter" id="counter">00 / 17</div>
        <p class="scorebar__caption">Айнымалы: ұпай саны</p>
        <button class="btn btn--ghost" id="resetBtn" type="button">↺ Ұпайды нөлдеу</button>
      </div>

      <nav class="tabs" role="tablist">
        <button class="tab active" id="tabBtn-mcq" data-tab="mcq" role="tab" aria-selected="true" type="button">
          📦 1-бөлім · Сұрақтар <span class="tab__count">10</span>
        </button>
        <button class="tab" id="tabBtn-tf" data-tab="tf" role="tab" aria-selected="false" type="button">
          🏷 2-бөлім · Дұрыс па, бұрыс па? <span class="tab__count">7</span>
        </button>
      </nav>

      <main>
        <section class="panel active" id="panel-mcq" role="tabpanel">
          <div class="cards" id="mcqCards"></div>
          <div class="pager" id="mcqPager"></div>
        </section>
        <section class="panel" id="panel-tf" role="tabpanel">
          <div class="cards" id="tfCards"></div>
          <div class="pager" id="tfPager"></div>
        </section>
      </main>

    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  var LETTERS = ["А","Ә","Б","В"];

  var mcq = [
    {
      q:"Айнымалы дегеніміз не?",
      options:["Тұрақты, ешқашан өзгермейтін сан","Суреттің атауы","Мәні өзгеруі мүмкін, аты бар сақтауыш","Компьютердің бөлігі"],
      correct:2,
      hint:"«Айнымалы» сөзінің түбірі — «айналу, өзгеру».",
      answer:"Жауабы — Б. Айнымалы — өз мәнін өзгерте алатын, аты бар сақтауыш (қорап тәрізді)."
    },
    {
      q:"Ойында «Ұпай» деген айнымалының мәні неге өзгереді?",
      options:["Ойыншы ұпай жинаған сайын","Ойын аты өзгергенде","Экран түсі өзгергенде","Ешқашан өзгермейді"],
      correct:0,
      hint:"Ойыншы жаңа ұпай алса, сан қалай болады?",
      answer:"Жауабы — А. Ұпай санағыш — ойыншы ұпай жинаған сайын мәні артатын айнымалы."
    },
    {
      q:"Айнымалыға ат қою кезінде не істеу дұрыс?",
      options:["Ешқандай ат қоймау","Кез келген таңба қою","Тек сурет салу","Түсінікті, мағыналы ат қою (мысалы: ұпай, жас)"],
      correct:3,
      hint:"Атын оқыған адам не үшін екенін түсінуі керек пе?",
      answer:"Жауабы — В. Айнымалыға түсінікті ат қою керек, сонда оның не сақтайтыны белгілі болады."
    },
    {
      q:"«Жас = 9» дегенде «жас» — не, ал «9» — не?",
      options:["Екеуі де мән","«жас» — айнымалының аты, «9» — оның мәні","«9» — айнымалының аты","Екеуі де ат"],
      correct:1,
      hint:"Атау бір рет қойылады, ал мән өзгере алады.",
      answer:"Жауабы — Ә. «Жас» — айнымалының аты, ал «9» — сол айнымалыда сақталған мән."
    },
    {
      q:"Айнымалының мәні бағдарлама жұмыс істеп тұрғанда өзгере алады ма?",
      options:["Жоқ, ешқашан","Тек түсі өзгереді","Иә, мәні жаңартылып отырады","Тек аты өзгереді"],
      correct:2,
      hint:"«Айнымалы» сөзінің өзі не туралы айтады?",
      answer:"Жауабы — Б. Айнымалының басты қасиеті — оның мәні жұмыс барысында өзгере алады."
    },
    {
      q:"Мына тізімнің қайсысы айнымалыға мысал бола алады?",
      options:["Ойыншының өмірі (жаны) саны","Ойынның атауы (өзгермейтін)","Компьютердің түсі","Экранның өлшемі (өзгермейтін)"],
      correct:0,
      hint:"Қайсысы ойын кезінде өзгеріп отырады?",
      answer:"Жауабы — А. Ойыншының жандар саны ойын барысында азаяды немесе көбейеді, яғни бұл айнымалы."
    },
    {
      q:"Айнымалының мәнін өзгерту үшін не істейміз?",
      options:["Компьютерді өшіреміз","Атын өзгертеміз","Ештеңе істемейміз","Жаңа мән меншіктейміз (береміз)"],
      correct:3,
      hint:"Қорапшадағы затты ауыстыру үшін не істейміз?",
      answer:"Жауабы — В. Айнымалыға жаңа мән беру арқылы (меншіктеу) оның мәнін өзгертеміз."
    },
    {
      q:"«Ұпай» айнымалысының бастапқы мәні қандай болғаны дұрыс?",
      options:["100","0","-5","Мән керек емес"],
      correct:1,
      hint:"Ойын жаңа басталғанда ұпай неше болу керек?",
      answer:"Жауабы — Ә. Ойын басында ұпай әдетте 0-ден басталады, содан кейін артады."
    },
    {
      q:"Айнымалыны қораппен салыстырсақ, қораптың сыртындағы жапсырма (атауы) нені білдіреді?",
      options:["Қораптың түсін","Қораптың салмағын","Айнымалының атын","Қораптың мәнін"],
      correct:2,
      hint:"Жапсырма — заттың не екенін көрсету үшін керек пе?",
      answer:"Жауабы — Б. Жапсырма — айнымалының атын білдіреді, ал қораптың іші — оның мәні."
    },
    {
      q:"Неге бағдарламаларда айнымалылар қажет?",
      options:["Мәліметтерді сақтап, өзгерту үшін","Экранды әдемі ету үшін","Компьютерді жылдам қосу үшін","Суреттерді өшіру үшін"],
      correct:0,
      hint:"Ұпай, жас, есім сияқты мәліметтерді қайда сақтаймыз?",
      answer:"Жауабы — А. Айнымалылар мәліметтерді сақтап, қажет болғанда өзгерту үшін қолданылады."
    }
  ];

  var tf = [
    {q:"Айнымалының мәні бағдарлама жұмысы кезінде өзгере алады.", correct:true,
     hint:"«Айнымалы» сөзінің мағынасын ойлан.", answer:"Дұрыс. Айнымалының басты қасиеті — оның мәні өзгере алады."},
    {q:"«Ұпай» — ойындағы айнымалыға жақсы мысал бола алады.", correct:true,
     hint:"Ұпай саны ойын кезінде өзгере ме?", answer:"Дұрыс. Ұпай ойыншы жеңіске жеткен сайын өзгеретін айнымалы."},
    {q:"Айнымалының аты әр жолы жаңа мән бергенде өзгеруі керек.", correct:false,
     hint:"Ат бір рет қойылады ма, әлде әр жолы ауыстырыла ма?", answer:"Бұрыс. Айнымалының аты тұрақты қалады, тек мәні өзгереді."},
    {q:"Айнымалыда бір ғана мән мәңгі сақталады, оны ауыстыруға болмайды.", correct:false,
     hint:"Қорапшадағы затты ауыстыруға бола ма?", answer:"Бұрыс. Айнымалыға жаңа мән беріп, ескісін ауыстыруға болады."},
    {q:"«Жас = 9» жазуында 9 саны — айнымалының мәні.", correct:true,
     hint:"Теңдік белгісінің оң жағында не тұр?", answer:"Дұрыс. 9 — «жас» айнымалысына берілген мән."},
    {q:"Компьютерлік бағдарламаларда айнымалылар қажет емес.", correct:false,
     hint:"Ұпай, өмір саны сияқты мәліметтерді сақтау үшін не керек?", answer:"Бұрыс. Айнымалылар мәліметтерді сақтау және өзгерту үшін өте қажет."},
    {q:"Айнымалыны қораппен, ал оның мәнін қораптың ішіндегі затпен салыстыруға болады.", correct:true,
     hint:"Жапсырмасы бар қорапты ойға елестет.", answer:"Дұрыс. Бұл — айнымалыны түсінудің қарапайым әдісі: қорап (ат) және оның ішіндегі зат (мән)."}
  ];

  var PAGE_SIZE_MCQ = 5;
  var PAGE_SIZE_TF = 4;

  var state = {
    mcqSel: mcq.map(function(){return null;}),
    tfSel: tf.map(function(){return null;}),
    mcqHint: mcq.map(function(){return false;}),
    mcqAns: mcq.map(function(){return false;}),
    tfHint: tf.map(function(){return false;}),
    tfAns: tf.map(function(){return false;}),
    mcqPage: 0,
    tfPage: 0
  };

  function totalScore(){
    var s = 0;
    mcq.forEach(function(item, i){ if(state.mcqSel[i] === item.correct) s++; });
    tf.forEach(function(item, i){ if(state.tfSel[i] === item.correct) s++; });
    return s;
  }

  function updateScore(){
    var s = totalScore();
    var total = mcq.length + tf.length;
    var el = document.getElementById("counter");
    el.textContent = (s < 10 ? "0"+s : s) + " / " + total;
    el.classList.remove("bump");
    void el.offsetWidth;
    el.classList.add("bump");
  }

  function buildMcqCard(item, i){
    var card = document.createElement("article");
    card.className = "card";

    var top = document.createElement("div");
    top.className = "card__top";
    var num = document.createElement("span");
    num.className = "card__num";
    num.textContent = (i+1);
    var q = document.createElement("p");
    q.className = "card__q";
    q.textContent = item.q;
    top.appendChild(num); top.appendChild(q);
    card.appendChild(top);

    var opts = document.createElement("div");
    opts.className = "card__options";
    item.options.forEach(function(text, oi){
      var b = document.createElement("button");
      b.type = "button";
      b.className = "opt";
      var tag = document.createElement("span");
      tag.className = "opt__tag";
      tag.textContent = LETTERS[oi] + ")";
      var label = document.createElement("span");
      label.textContent = text;
      b.appendChild(tag); b.appendChild(label);
      applyOptState(b, i, oi, item, state.mcqSel[i]);
      b.addEventListener("click", function(){
        state.mcqSel[i] = oi;
        Array.prototype.forEach.call(opts.children, function(child, ci){
          applyOptState(child, i, ci, item, oi);
        });
        updateScore();
      });
      opts.appendChild(b);
    });
    card.appendChild(opts);

    card.appendChild(buildTools(i, item, state.mcqHint, state.mcqAns));
    return card;
  }

  function applyOptState(btn, qi, oi, item, selected){
    btn.classList.remove("is-selected","is-correct","is-wrong");
    if(selected === null || selected === undefined) return;
    if(oi === selected){
      btn.classList.add("is-selected");
      btn.classList.add(oi === item.correct ? "is-correct" : "is-wrong");
    } else if(oi === item.correct && selected !== item.correct){
      btn.classList.add("is-correct");
    }
  }

  function buildTfCard(item, i){
    var card = document.createElement("article");
    card.className = "card";

    var top = document.createElement("div");
    top.className = "card__top";
    var num = document.createElement("span");
    num.className = "card__num";
    num.textContent = (i+1);
    var q = document.createElement("p");
    q.className = "card__q";
    q.textContent = item.q;
    top.appendChild(num); top.appendChild(q);
    card.appendChild(top);

    var opts = document.createElement("div");
    opts.className = "card__options";
    [["Дұрыс ✓", true], ["Бұрыс ✕", false]].forEach(function(pair){
      var text = pair[0], val = pair[1];
      var b = document.createElement("button");
      b.type = "button";
      b.className = "opt tf";
      b.textContent = text;
      applyTfState(b, item, val, state.tfSel[i]);
      b.addEventListener("click", function(){
        state.tfSel[i] = val;
        Array.prototype.forEach.call(opts.children, function(child, ci){
          applyTfState(child, item, [true,false][ci], val);
        });
        updateScore();
      });
      opts.appendChild(b);
    });
    card.appendChild(opts);

    card.appendChild(buildTools(i, item, state.tfHint, state.tfAns));
    return card;
  }

  function applyTfState(btn, item, ownVal, selected){
    btn.classList.remove("is-selected","is-correct","is-wrong");
    if(selected === null || selected === undefined) return;
    if(ownVal === selected){
      btn.classList.add("is-selected");
      btn.classList.add(ownVal === item.correct ? "is-correct" : "is-wrong");
    } else if(ownVal === item.correct && selected !== item.correct){
      btn.classList.add("is-correct");
    }
  }

  function buildTools(i, item, hintArr, ansArr){
    var wrap = document.createElement("div");

    var tools = document.createElement("div");
    tools.className = "card__tools";

    var hintBtn = document.createElement("button");
    hintBtn.type = "button";
    hintBtn.className = "tool";
    hintBtn.dataset.type = "hint";
    hintBtn.textContent = "💡 Кеңес";

    var ansBtn = document.createElement("button");
    ansBtn.type = "button";
    ansBtn.className = "tool";
    ansBtn.dataset.type = "answer";
    ansBtn.textContent = "🔑 Жауап";

    tools.appendChild(hintBtn); tools.appendChild(ansBtn);
    wrap.appendChild(tools);

    var hintBox = document.createElement("div");
    hintBox.className = "card__reveal hint";
    hintBox.textContent = "💡 " + item.hint;
    hintBox.hidden = !hintArr[i];

    var ansBox = document.createElement("div");
    ansBox.className = "card__reveal answer";
    ansBox.textContent = "✅ " + item.answer;
    ansBox.hidden = !ansArr[i];

    hintBtn.classList.toggle("is-open", hintArr[i]);
    ansBtn.classList.toggle("is-open", ansArr[i]);

    hintBtn.addEventListener("click", function(){
      hintArr[i] = !hintArr[i];
      hintBox.hidden = !hintArr[i];
      hintBtn.classList.toggle("is-open", hintArr[i]);
    });
    ansBtn.addEventListener("click", function(){
      ansArr[i] = !ansArr[i];
      ansBox.hidden = !ansArr[i];
      ansBtn.classList.toggle("is-open", ansArr[i]);
    });

    wrap.appendChild(hintBox);
    wrap.appendChild(ansBox);
    return wrap;
  }

  function renderPage(kind){
    var isMcq = kind === "mcq";
    var data = isMcq ? mcq : tf;
    var pageSize = isMcq ? PAGE_SIZE_MCQ : PAGE_SIZE_TF;
    var page = isMcq ? state.mcqPage : state.tfPage;
    var container = document.getElementById(isMcq ? "mcqCards" : "tfCards");
    var pagerEl = document.getElementById(isMcq ? "mcqPager" : "tfPager");

    var pageCount = Math.ceil(data.length / pageSize);
    var start = page * pageSize;
    var end = Math.min(start + pageSize, data.length);

    container.innerHTML = "";
    for(var i = start; i < end; i++){
      container.appendChild(isMcq ? buildMcqCard(data[i], i) : buildTfCard(data[i], i));
    }

    pagerEl.innerHTML = "";
    if(pageCount > 1){
      var prev = document.createElement("button");
      prev.type = "button";
      prev.textContent = "← Алдыңғы";
      prev.disabled = page === 0;
      prev.addEventListener("click", function(){
        if(isMcq){ state.mcqPage--; } else { state.tfPage--; }
        renderPage(kind);
      });

      var dots = document.createElement("div");
      dots.className = "pager__dots";
      for(var p = 0; p < pageCount; p++){
        var d = document.createElement("span");
        d.className = "pager__dot" + (p === page ? " active" : "");
        dots.appendChild(d);
      }

      var next = document.createElement("button");
      next.type = "button";
      next.textContent = "Келесі →";
      next.disabled = page === pageCount - 1;
      next.addEventListener("click", function(){
        if(isMcq){ state.mcqPage++; } else { state.tfPage++; }
        renderPage(kind);
      });

      pagerEl.appendChild(prev);
      pagerEl.appendChild(dots);
      pagerEl.appendChild(next);
    }
  }

  function switchTab(target){
    ["mcq","tf"].forEach(function(k){
      var isTarget = k === target;
      document.getElementById("tabBtn-" + k).classList.toggle("active", isTarget);
      document.getElementById("tabBtn-" + k).setAttribute("aria-selected", isTarget ? "true" : "false");
      document.getElementById("panel-" + k).classList.toggle("active", isTarget);
    });
  }

  document.getElementById("tabBtn-mcq").addEventListener("click", function(){ switchTab("mcq"); });
  document.getElementById("tabBtn-tf").addEventListener("click", function(){ switchTab("tf"); });

  document.getElementById("resetBtn").addEventListener("click", function(){
    state.mcqSel = mcq.map(function(){return null;});
    state.tfSel = tf.map(function(){return null;});
    renderPage("mcq");
    renderPage("tf");
    updateScore();
  });

  renderPage("mcq");
  renderPage("tf");
  updateScore();
})();
</script>
